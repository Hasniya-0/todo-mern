version: "3.8"
services:
  client:
    build:
      context: ./src/client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: always

  server:
    build:
      context: ./src/server
    ports:
      - "5000:5000"
    env_file:
      - .env      # ✅ Load variables from .env
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:7.0
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
